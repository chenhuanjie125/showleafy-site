<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Returning to PhotoHarbor</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 420px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: color-mix(in srgb, CanvasText 72%, transparent);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Returning to PhotoHarbor</h1>
    <p id="status">Completing Google Drive folder selection...</p>
  </main>
  <script>
    function base64UrlDecode(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
      const padding = "=".repeat((4 - (base64.length % 4)) % 4);
      return atob(base64 + padding);
    }

    function fail(message) {
      document.getElementById("status").textContent = message;
    }

    function queryFromLocation() {
      if (window.location.search.length > 1) {
        return new URLSearchParams(window.location.search);
      }
      if (window.location.hash.length > 1) {
        return new URLSearchParams(window.location.hash.slice(1));
      }
      return new URLSearchParams();
    }

    function appendQuery(uri, query) {
      const separator = uri.includes("?") ? "&" : "?";
      return uri + separator + query.toString();
    }

    (function redirectToApp() {
      const params = queryFromLocation();
      const state = params.get("state");
      if (!state) {
        fail("Missing OAuth state. Please return to PhotoHarbor and try again.");
        return;
      }

      let payload;
      try {
        payload = JSON.parse(base64UrlDecode(state));
      } catch (error) {
        fail("The OAuth state could not be read. Please return to PhotoHarbor and try again.");
        return;
      }

      const returnURI = String(payload.return_uri || "");
      if (!returnURI || /^https?:/i.test(returnURI)) {
        fail("The PhotoHarbor return link is invalid. Please return to the app and try again.");
        return;
      }
      if (!/^(com\.googleusercontent\.apps\.|com\.chenhuanjie\.PhotoNAS:|photoharbor:)/i.test(returnURI)) {
        fail("The PhotoHarbor return link is not recognized. Please return to the app and try again.");
        return;
      }

      window.location.replace(appendQuery(returnURI, params));
    })();
  </script>
</body>
</html>
