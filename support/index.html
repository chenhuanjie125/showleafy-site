<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支持 | 手页 Showleafy</title>
  <meta name="description" content="手页 Showleafy 的支持页面，包含联系邮箱、支持范围与常用链接。">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="shell">
    <section class="card page-head">
      <p class="eyebrow"><a class="back-link" href="../">Showleafy</a></p>
      <h1>支持</h1>
      <p class="lead">
        如果你在使用手页时遇到问题，或想反馈建议、隐私相关事项，可以通过下方方式联系我。
      </p>
    </section>

    <section class="grid single">
      <article class="card">
        <h2>联系邮箱</h2>
        <p>
          <a href="mailto:support@showleafy.com">support@showleafy.com</a>
        </p>
      </article>

      <article class="card">
        <h2>支持范围</h2>
        <p>你可以通过邮件联系我处理以下事项：</p>
        <ul>
          <li>App 使用问题与异常反馈</li>
          <li>功能建议与体验意见</li>
          <li>购买、恢复购买与权益相关问题</li>
          <li>隐私与数据处理相关咨询</li>
        </ul>
      </article>

      <article class="card">
        <h2>回复时间</h2>
        <p>
          通常会在 3-5 个工作日内回复。若邮件量较大，回复时间可能略有延迟。
        </p>
      </article>

      <article class="card">
        <h2>适用平台</h2>
        <p>
          当前支持页面主要面向手页在 iPhone 与 iPad 上的使用者。
        </p>
      </article>

      <article class="card">
        <h2>相关页面</h2>
        <p>
          <a href="../privacy/">查看隐私政策</a>
        </p>
      </article>
    </section>
  </main>
</body>
</html>
